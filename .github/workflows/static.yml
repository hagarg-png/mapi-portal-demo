function renderSFPanel(route){
  const data = SF_CONTENT[route] || [];
  const body = document.getElementById('sf-panel-body');
  body.innerHTML = data.map(s=>`
    <div class="sf-step">
      <div class="font-semibold mb-1">🧑‍💻 פעולת לקוח: ${s.step}</div>
