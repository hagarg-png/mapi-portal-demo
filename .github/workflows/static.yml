/* ================= ROUTING ================= */
function go(route){
  document.querySelectorAll('.route').forEach(r=>r.classList.remove('active'));
  document.getElementById('route-'+route).classList.add('active');
  document.getElementById('route-'+route).classList.remove('fade-in'); void document.getElementById('route-'+route).offsetWidth; document.getElementById('route-'+route).classList.add('fade-in');
  window.scrollTo({top:0, behavior:'smooth'});
  renderSFPanel(route);
  if(route==='catalog') renderCatalog();
  if(route==='cart') renderCart();
  if(route==='checkout') renderCheckout(1);
  if(route==='account') renderAccount('orders');
  if(route==='support') renderCases();
}

function searchFromHome(){
  const v = document.getElementById('homeSearch').value;
  go('catalog');
  setTimeout(()=>{ document.getElementById('catalogSearch').value = v; renderCatalog(); }, 50);
}

