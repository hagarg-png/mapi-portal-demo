        <div class="grid grid-cols-2 gap-3 text-sm mb-5">
          <div><b>סוג:</b> ${p.type}</div>
          <div><b>רזולוציה:</b> ${p.res}</div>
          <div><b>רישיון:</b> ${p.lic}</div>
          <div><b>מסלול מכירה:</b> ${cat.tracks.join(', ')}</div>
        </div>
        <div class="text-3xl font-extrabold mb-4" style="color:var(--navy)">${p.price.toLocaleString()} ₪</div>
        <div class="flex items-center gap-3 mb-2">
          <div class="flex items-center border rounded-lg" style="border-color:var(--line)">
            <button class="qty-btn" onclick="stepQty(-1)">-</button>
            <span id="pQty" class="w-10 text-center">1</span>
            <button class="qty-btn" onclick="stepQty(1)">+</button>
          </div>
          <button class="gold-btn rounded-lg px-6 py-2.5 font-semibold sf-highlight" onclick="addToCart('${p.id}')">הוספה לסל</button>
          <button class="navy-btn rounded-lg px-6 py-2.5 font-semibold sf-highlight" onclick="requestQuote('${p.id}')">בקשת הצעת מחיר</button>
        </div>
        <div class="sf-badge">SF: הוספה לסל ← OpportunityLineItem בטיוטת Opportunity | בקשת הצעה ← יצירת Quote מקושרת</div>
      </div>
    </div>
    <div class="mt-10">
      <h2 class="text-lg font-bold mb-3" style="color:var(--navy)">מוצרים קשורים</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">${related.map(productCard).join('')}</div>
    </div>
    <div class="mt-10 max-w-2xl">
      <h2 class="text-lg font-bold mb-3" style="color:var(--navy)">שאלות נפוצות</h2>
      <div class="space-y-2">${FAQS.map(f=>`<details class="card p-3"><summary class="cursor-pointer font-medium text-sm">${f}</summary><div class="text-sm mt-2" style="color:var(--ink-soft)">מענה מלא מוצג ללקוח בהתאם למאפייני המוצר והרישיון שנבחר.</div></details>`).join('')}</div>
    </div>
  `;
}
let pQty = 1;
function stepQty(d){ pQty = Math.max(1, pQty+d); document.getElementById('pQty').textContent = pQty; }
function addToCart(id){
  const existing = cart.find(c=>c.id===id);
  if(existing) existing.qty += pQty; else cart.push({id, qty:pQty});
  pQty = 1;
  updateCartCount();
  alert('המוצר נוסף לסל הקניות');
}
function requestQuote(id){
  alert('בקשת הצעת מחיר נשלחה - נוצרה רשומת Quote במערכת, ותישלח הצעה מפורטת למייל הלקוח בתוך יום עסקים.');
}
function updateCartCount(){
  document.getElementById('cartCount').textContent = cart.reduce((s,c)=>s+c.qty,0);
}

/* ================= CART ================= */
function renderCart(){
  if(!cart.length){
    document.getElementById('cartItems').innerHTML = '<div class="card p-8 text-center" style="color:var(--ink-soft)">הסל ריק. עברו לקטלוג כדי להוסיף מוצרים.</div>';
  } else {
    document.getElementById('cartItems').innerHTML = cart.map(c=>{
      const p = PRODUCTS.find(pp=>pp.id===c.id);
      return `<div class="card p-4 flex items-center gap-4">
        <div class="w-16 h-16 rounded-lg overflow-hidden shrink-0">${categoryArt(p.cat)}</div>
        <div class="flex-1">
          <div class="font-semibold text-sm">${p.name}</div>
          <div class="text-xs" style="color:var(--ink-soft)">${p.type} · ${p.lic}</div>
        </div>
        <div class="flex items-center border rounded-lg" style="border-color:var(--line)">
          <button class="qty-btn" onclick="cartQty('${c.id}',-1)">-</button>
          <span class="w-8 text-center text-sm">${c.qty}</span>
          <button class="qty-btn" onclick="cartQty('${c.id}',1)">+</button>
        </div>
        <div class="font-bold w-24 text-left" style="color:var(--navy)">${(p.price*c.qty).toLocaleString()} ₪</div>
        <button class="text-xs text-red-600" onclick="removeCart('${c.id}')">הסרה</button>
      </div>`;
    }).join('');
  }
  const sub = cart.reduce((s,c)=>s+PRODUCTS.find(p=>p.id===c.id).price*c.qty,0);
  document.getElementById('sumSub').textContent = sub.toLocaleString()+' ₪';
  document.getElementById('sumVat').textContent = Math.round(sub*0.17).toLocaleString()+' ₪';
  document.getElementById('sumTotal').textContent = Math.round(sub*1.17).toLocaleString()+' ₪';
}
function cartQty(id,d){
  const c = cart.find(x=>x.id===id); c.qty = Math.max(1,c.qty+d);
  updateCartCount(); renderCart();
}
function removeCart(id){ cart = cart.filter(c=>c.id!==id); updateCartCount(); renderCart(); }

