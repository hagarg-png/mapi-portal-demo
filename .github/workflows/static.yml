      <button class="gold-btn rounded-lg px-6 py-2.5 mt-6 font-semibold" onclick="renderCheckout(2)">המשך</button>`;
  } else if(step===2){
    html = `<div class="font-bold mb-4">אופן קבלת המוצר</div>
      <label class="flex items-center gap-2 mb-3 text-sm"><input type="radio" name="delivery" checked> הורדה דיגיטלית מיידית באזור האישי</label>
