function tableWrap(headers, rows){
  return `<div class="card overflow-x-auto"><table class="w-full text-sm"><thead><tr style="background:var(--paper)">${headers.map(h=>`<th class="text-start p-3 font-semibold">${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr class="border-t" style="border-color:var(--line)">${r.map(c=>`<td class="p-3">${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}
function statusPill(s){
  const color = s.includes('הושלם')||s==='פעיל'||s==='אושרה' ? 'var(--ok)' : 'var(--warn)';
  return `<span class="text-xs font-semibold px-2 py-1 rounded-full" style="background:${color}20; color:${color}">${s}</span>`;
}
function sfNote(t){ return `<div class="sf-badge mt-4">${t}</div>`; }
function notifRow(t,time){ return `<div class="card p-3 flex justify-between text-sm"><span>${t}</span><span style="color:var(--ink-soft)" class="text-xs">${time}</span></div>`; }

/* ================= SUPPORT / CASES ================= */
let demoCases = [
  {id:'CASE-2291', type:'בקשה לייעוץ מודד מוסמך', status:'בטיפול'},
  {id:'CASE-2277', type:'בירור חשבונית / תשלום', status:'נסגר'},
];
function renderCases(targetId){
  const html = demoCases.map(c=>`<div class="flex items-center justify-between border-b py-2 last:border-0" style="border-color:var(--line)">
      <div><div class="font-medium">${c.id}</div><div class="text-xs" style="color:var(--ink-soft)">${c.type}</div></div>
      ${statusPill(c.status)}
    </div>`).join('');
  const el = document.getElementById(targetId || 'caseList');
  if(el) el.innerHTML = html;
}
function submitCase(){
  const nid = 'CASE-'+Math.floor(2300+Math.random()*99);
  demoCases.unshift({id:nid, type:'פנייה חדשה', status:'נפתח'});
  renderCases();
  alert('הפנייה נשלחה בהצלחה. מספר פנייה: '+nid);
}
</script>
</body>
</html>
