      <div class="flex gap-2 mt-6">
        <button class="navy-btn rounded-lg px-6 py-2.5 font-semibold" onclick="renderCheckout(1)">חזרה</button>
        <button class="gold-btn rounded-lg px-6 py-2.5 font-semibold" onclick="renderCheckout(3)">המשך לתשלום</button>
      </div>`;
  } else if(step===3){
    html = `<div class="font-bold mb-4">פרטי תשלום</div>
      <div class="grid sm:grid-cols-2 gap-4 text-sm">
        <div class="sm:col-span-2"><label class="block mb-1">מספר כרטיס אשראי</label><input class="w-full border rounded-lg px-3 py-2" style="border-color:var(--line)" placeholder="0000 0000 0000 0000"></div>
        <div><label class="block mb-1">בתוקף עד</label><input class="w-full border rounded-lg px-3 py-2" style="border-color:var(--line)" placeholder="MM/YY"></div>
