/* ================= HOME RENDER ================= */
function renderHome(){
  document.getElementById('quickCats').innerHTML = CATEGORIES.slice(0,8).map(c=>`
    <div class="card p-4 text-center cursor-pointer hover:shadow-md transition" onclick="filterCategoryAndGo('${c.id}')">
      <div class="text-2xl mb-1">${c.icon}</div>
      <div class="text-sm font-semibold">${c.name}</div>
    </div>`).join('');
  document.getElementById('featuredGrid').innerHTML = PRODUCTS.slice(0,4).map(productCard).join('');
}
function filterCategoryAndGo(catId){
  go('catalog');
  setTimeout(()=>{ activeCat = catId; renderCatalog(); }, 50);
}

/* ================= PRODUCT CARD ================= */
function productCard(p){
  const cat = CATEGORIES.find(c=>c.id===p.cat);
  return `<div class="card overflow-hidden flex flex-col">
    <div class="h-32 relative overflow-hidden">${categoryArt(p.cat)}
      <span class="absolute top-2 start-2 bg-white/90 backdrop-blur rounded-full w-8 h-8 flex items-center justify-center text-sm shadow" title="${cat.name}">${cat.icon}</span>
    </div>
    <div class="p-4 flex flex-col flex-1">
      <div class="text-xs mb-1" style="color:var(--teal)">${cat.name}</div>
      <div class="font-semibold text-sm mb-2 leading-snug">${p.name}</div>
      <div class="text-xs mb-3" style="color:var(--ink-soft)">${p.type} · ${p.lic}</div>
      <div class="mt-auto flex items-center justify-between">
        <span class="font-bold" style="color:var(--navy)">${p.price.toLocaleString()} ₪</span>
        <button class="text-xs font-semibold px-3 py-1.5 rounded-lg navy-btn" onclick="openProduct('${p.id}')">פרטים</button>
      </div>
    </div>
  </div>`;
}

/* ================= CATALOG ================= */
let activeCat = null;
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('catFilter').innerHTML = `<label class="flex items-center gap-2"><input type="radio" name="catf" checked onclick="activeCat=null; renderCatalog();"> הכול</label>` +
    CATEGORIES.map(c=>`<label class="flex items-center gap-2"><input type="radio" name="catf" onclick="activeCat='${c.id}'; renderCatalog();"> ${c.icon} ${c.name}</label>`).join('');
  const types = [...new Set(PRODUCTS.map(p=>p.type))];
  document.getElementById('typeFilter').innerHTML = types.map(t=>`<span class="chip" onclick="toggleTypeChip(this,'${t}')">${t}</span>`).join('');
});
let activeTypes = new Set();
function toggleTypeChip(el, t){
  el.classList.toggle('active');
  if(activeTypes.has(t)) activeTypes.delete(t); else activeTypes.add(t);
  renderCatalog();
}
function renderCatalog(){
  const q = (document.getElementById('catalogSearch')?.value || '').trim();
  const res = document.getElementById('resFilter')?.value || '';
  const maxPrice = Number(document.getElementById('priceFilter')?.value || 5000);
  document.getElementById('priceVal') && (document.getElementById('priceVal').textContent = maxPrice);
  const lic = document.getElementById('licFilter')?.value || '';
  const sort = document.getElementById('sortSel')?.value || 'rel';

  let list = PRODUCTS.filter(p=>{
    if(activeCat && p.cat!==activeCat) return false;
    if(activeTypes.size && !activeTypes.has(p.type)) return false;
    if(res && p.res!==res) return false;
    if(lic && p.lic!==lic) return false;
    if(p.price>maxPrice) return false;
    if(q && !(p.name+p.desc+p.type).includes(q)) return false;
    return true;
  });
  if(sort==='priceAsc') list.sort((a,b)=>a.price-b.price);
  if(sort==='priceDesc') list.sort((a,b)=>b.price-a.price);

  document.getElementById('resultCount').textContent = list.length;
  document.getElementById('catalogGrid').innerHTML = list.map(productCard).join('') || '<div class="col-span-3 text-center py-10" style="color:var(--ink-soft)">לא נמצאו תוצאות מתאימות</div>';
}

