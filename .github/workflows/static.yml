<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>המרכז למיפוי ישראל | פורטל שירותים ומוצרים דיגיטלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root{
    --navy:#0d2b45;
    --navy-dark:#081b2e;
    --teal:#0f7c8c;
    --teal-light:#e6f3f4;
    --gold:#b8873a;
    --gold-light:#f6ecdb;
    --paper:#f7f8fa;
    --line:#dfe4e9;
    --ink:#1a2733;
    --ink-soft:#5b6b78;
    --ok:#2f7d4f;
    --warn:#b8873a;
  }
  *{font-family:'Heebo',sans-serif;}
  body{background:var(--paper); color:var(--ink);}
  .route{display:none;}
  .route.active{display:block;}
  .brand-gradient{background:linear-gradient(135deg, var(--navy) 0%, #123a5c 55%, var(--teal) 130%);}
  .gold-btn{background:var(--gold); color:#fff;}
  .gold-btn:hover{background:#a37527;}
  .navy-btn{background:var(--navy); color:#fff;}
  .navy-btn:hover{background:var(--navy-dark);}
  .card{background:#fff; border:1px solid var(--line); border-radius:10px;}
  .chip{border:1px solid var(--line); border-radius:999px; padding:4px 12px; font-size:12px; color:var(--ink-soft); background:#fff;}
  .chip.active{background:var(--teal); color:#fff; border-color:var(--teal);}
  ::-webkit-scrollbar{width:8px; height:8px;}
  ::-webkit-scrollbar-thumb{background:#c7ced4; border-radius:8px;}

  /* Salesforce annotation layer */
  .sf-badge{display:none; align-items:center; gap:6px; font-size:11px; background:#fff3e0; color:#8a5a00; border:1px dashed #d9a441; border-radius:6px; padding:3px 8px; margin-top:6px; line-height:1.5;}
  body.sf-on .sf-badge{display:inline-flex;}
  body.sf-on .sf-highlight{outline:2px dashed #d9a441; outline-offset:3px;}
  #sf-panel{position:fixed; inset-inline-end:0; top:0; height:100%; width:360px; max-width:88vw; background:#fff; border-inline-start:1px solid var(--line); box-shadow:-6px 0 24px rgba(0,0,0,.08); transform:translateX(110%); transition:transform .28s ease; z-index:60; overflow-y:auto;}
  html[dir="rtl"] #sf-panel{transform:translateX(-110%);}
  #sf-panel.open{transform:translateX(0);}
  .sf-step{border-inline-start:3px solid var(--teal); padding:8px 12px; margin-bottom:10px; background:var(--teal-light); border-radius:6px;}
  .toggle-wrap{display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none;}
  .toggle-track{width:40px; height:22px; background:#3a5064; border-radius:999px; position:relative; transition:.2s;}
  .toggle-dot{position:absolute; top:2px; right:2px; width:18px; height:18px; background:#fff; border-radius:999px; transition:.2s;}
  body.sf-on .toggle-track{background:var(--gold);}
  body.sf-on .toggle-dot{right:20px;}
  .step-dot{width:26px; height:26px; border-radius:999px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:var(--line); color:var(--ink-soft);}
  .step-dot.on{background:var(--teal); color:#fff;}
  .fade-in{animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}
  .qty-btn{width:28px; height:28px; border:1px solid var(--line); border-radius:6px; display:flex; align-items:center; justify-content:center; background:#fff;}
  .map-mock{background:repeating-linear-gradient(45deg, #eef3f5, #eef3f5 10px, #e3ecef 10px, #e3ecef 20px);}
</style>
</head>
<body class="sf-on">

<!-- ============ Top gov strip ============ -->
<div class="brand-gradient text-white text-xs">
  <div class="max-w-7xl mx-auto px-4 py-1.5 flex items-center justify-between">
    <span>מדינת ישראל | משרד המשפטים | המרכז למיפוי ישראל (מפ"י)</span>
    <div class="hidden sm:flex items-center gap-4">
      <span>נגישות</span>
      <span>English</span>
      <span>יצירת קשר</span>
    </div>
  </div>
</div>

<!-- ============ Header ============ -->
<header class="bg-white border-b" style="border-color:var(--line);">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
    <div class="flex items-center gap-3 cursor-pointer" onclick="go('home')">
      <div class="w-11 h-11 rounded-lg brand-gradient flex items-center justify-center text-white font-extrabold text-lg">מ"י</div>
      <div>
        <div class="font-bold text-lg leading-tight" style="color:var(--navy)">המרכז למיפוי ישראל</div>
        <div class="text-xs" style="color:var(--ink-soft)">פורטל מוצרים ושירותים דיגיטלי</div>
      </div>
    </div>
    <nav class="hidden lg:flex items-center gap-6 text-sm font-medium" style="color:var(--ink)">
      <a class="hover:opacity-70" onclick="go('home')">בית</a>
      <a class="hover:opacity-70" onclick="go('catalog')">קטלוג מוצרים ושירותים</a>
      <a class="hover:opacity-70" onclick="go('account')">האזור האישי</a>
      <a class="hover:opacity-70" onclick="go('support')">תמיכה ושירותים מקצועיים</a>
    </nav>
    <div class="flex items-center gap-3">
      <div class="toggle-wrap text-xs font-medium" style="color:var(--ink-soft)" onclick="toggleSF()">
        <span class="hidden md:inline">תצוגת ארכיטקטורת Salesforce</span>
        <div class="toggle-track"><div class="toggle-dot"></div></div>
      </div>
      <button class="relative navy-btn rounded-lg px-3 py-2 text-sm" onclick="go('cart')">
        סל קניות
        <span id="cartCount" class="absolute -top-2 -start-2 bg-white text-[11px] font-bold rounded-full w-5 h-5 flex items-center justify-center" style="color:var(--navy); border:1px solid var(--line);">0</span>
      </button>
      <button class="hidden sm:block gold-btn rounded-lg px-3 py-2 text-sm" onclick="go('account')">האזור האישי שלי</button>
    </div>
  </div>
</header>

<!-- ============ SF Architecture Side Panel ============ -->
<div id="sf-panel">
  <div class="p-4 border-b flex items-center justify-between" style="border-color:var(--line); background:var(--navy); color:#fff;">
    <div class="font-bold">ארכיטקטורת Salesforce למסך הנוכחי</div>
    <button onclick="closeSFPanel()" class="text-white text-xl leading-none">&times;</button>
  </div>
  <div id="sf-panel-body" class="p-4 text-sm"></div>
</div>

<main class="max-w-7xl mx-auto px-4 py-8">

<!-- ============ HOME ============ -->
<section id="route-home" class="route active fade-in">
  <div class="brand-gradient rounded-2xl p-8 md:p-14 text-white relative overflow-hidden">
    <div class="max-w-2xl relative z-10">
      <div class="text-xs uppercase tracking-wide opacity-80 mb-2">שירות ממשלתי דיגיטלי</div>
      <h1 class="text-3xl md:text-4xl font-extrabold leading-tight mb-4">מפות, נתונים גיאוגרפיים ושירותי מדידה - במקום אחד</h1>
      <p class="text-white/85 mb-6 leading-relaxed">גישה לכלל מוצרי ושירותי המרכז למיפוי ישראל: תצלומי אוויר, אורתופוטו, מפות טופוגרפיות והיסטוריות, שכבות GIS, שירותי GNSS ומדידה - הזמנה, תשלום ומעקב מקוונים.</p>
      <div class="bg-white rounded-xl p-2 flex items-center gap-2 shadow-lg">
        <input id="homeSearch" type="text" placeholder="חפשו מוצר, שירות או אזור בארץ..." class="flex-1 px-3 py-2 text-ink outline-none rounded-lg" style="color:#1a2733;">
        <button class="gold-btn rounded-lg px-5 py-2 text-sm font-semibold" onclick="searchFromHome()">חיפוש</button>
      </div>
      <div class="sf-badge mt-3">SF: חיפוש אנונימי ← אין רשומה נוצרת. שליחת טופס יצירת קשר ← Web-to-Lead ← אובייקט Lead</div>
    </div>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-8" id="quickCats"></div>

  <div class="flex items-center justify-between mt-12 mb-4">
    <h2 class="text-xl font-bold" style="color:var(--navy)">מוצרים ושירותים נבחרים</h2>
    <button class="text-sm font-medium" style="color:var(--teal)" onclick="go('catalog')">לכל הקטלוג ←</button>
  </div>
  <div id="featuredGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5"></div>

  <div class="grid md:grid-cols-3 gap-5 mt-14">
    <div class="card p-5">
      <div class="text-2xl mb-2">🗺️</div>
      <div class="font-bold mb-1">15 מסלולי מכירה מובנים</div>
      <div class="text-sm" style="color:var(--ink-soft)">מרישום מנוי CORS ועד תיק גוש-חלקה - כל מסלול מנוהל כ-Record Type ייעודי על גבי Opportunity.</div>
    </div>
    <div class="card p-5">
      <div class="text-2xl mb-2">📄</div>
      <div class="font-bold mb-1">הזמנה, תשלום ומעקב מקוונים</div>
      <div class="text-sm" style="color:var(--ink-soft)">מהצעת מחיר ועד הורדת הקובץ הסופי - כל השלבים נגישים באזור האישי בזמן אמת.</div>
    </div>
    <div class="card p-5">
      <div class="text-2xl mb-2">🎧</div>
      <div class="font-bold mb-1">תמיכה ושירותים מקצועיים</div>
      <div class="text-sm" style="color:var(--ink-soft)">פתיחת פניות, בקשת ייעוץ מודד וקבלת אישורים - הכול מתועד ומטופל דרך Case Management.</div>
    </div>
  </div>
</section>

<!-- ============ CATALOG ============ -->
<section id="route-catalog" class="route fade-in">
  <div class="flex items-center gap-2 text-sm mb-4" style="color:var(--ink-soft)">
    <span class="cursor-pointer" onclick="go('home')">בית</span> / <span style="color:var(--ink)">קטלוג מוצרים ושירותים</span>
  </div>
  <h1 class="text-2xl font-bold mb-1" style="color:var(--navy)">קטלוג מוצרים ושירותים</h1>
  <p class="text-sm mb-6" style="color:var(--ink-soft)">15 מסלולי מכירה, 9 קטגוריות מוצר. סננו לפי סוג מפה, קנה מידה, אזור, רזולוציה, תאריך, מחיר ורישיון.</p>
  <div class="sf-badge mb-4">SF: כל תוצאה מוצגת נשלפת מ-Product2 + Price Book Entry לפי מחירון פעיל</div>

  <div class="grid md:grid-cols-4 gap-6">
    <aside class="md:col-span-1 space-y-5">
      <div class="card p-4">
        <input id="catalogSearch" oninput="renderCatalog()" type="text" placeholder="חיפוש חופשי..." class="w-full border rounded-lg px-3 py-2 text-sm" style="border-color:var(--line);">
      </div>
      <div class="card p-4">
        <div class="font-semibold text-sm mb-2">קטגוריה</div>
        <div id="catFilter" class="flex flex-col gap-1 text-sm"></div>
      </div>
      <div class="card p-4">
        <div class="font-semibold text-sm mb-2">סוג נתון / מפה</div>
        <div class="flex flex-wrap gap-2" id="typeFilter"></div>
      </div>
      <div class="card p-4">
        <div class="font-semibold text-sm mb-2">רזולוציה</div>
        <select id="resFilter" onchange="renderCatalog()" class="w-full border rounded-lg px-2 py-1.5 text-sm" style="border-color:var(--line);">
          <option value="">הכול</option>
          <option>גס (&gt;1מ')</option>
          <option>בינוני (10-50 ס"מ)</option>
          <option>גבוה (&lt;10 ס"מ)</option>
        </select>
      </div>
      <div class="card p-4">
        <div class="font-semibold text-sm mb-2">טווח מחיר (₪)</div>
        <input id="priceFilter" type="range" min="0" max="5000" value="5000" oninput="renderCatalog()" class="w-full">
        <div class="text-xs" style="color:var(--ink-soft)">עד <span id="priceVal">5000</span> ₪</div>
      </div>
      <div class="card p-4">
        <div class="font-semibold text-sm mb-2">סוג רישיון</div>
        <select id="licFilter" onchange="renderCatalog()" class="w-full border rounded-lg px-2 py-1.5 text-sm" style="border-color:var(--line);">
          <option value="">הכול</option>
          <option>שימוש אישי</option>
          <option>שימוש ארגוני</option>
          <option>מנוי מתחדש</option>
        </select>
      </div>
    </aside>
    <div class="md:col-span-3">
      <div class="flex items-center justify-between mb-3">
        <div class="text-sm" style="color:var(--ink-soft)"><span id="resultCount"></span> תוצאות</div>
        <select onchange="renderCatalog()" id="sortSel" class="border rounded-lg px-2 py-1.5 text-sm" style="border-color:var(--line);">
          <option value="rel">מיון: רלוונטיות</option>
          <option value="priceAsc">מחיר: מהנמוך לגבוה</option>
          <option value="priceDesc">מחיר: מהגבוה לנמוך</option>
        </select>
      </div>
      <div id="catalogGrid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5"></div>
    </div>
  </div>
</section>

<!-- ============ PRODUCT ============ -->
<section id="route-product" class="route fade-in">
  <div id="productDetail"></div>
</section>

<!-- ============ CART ============ -->
<section id="route-cart" class="route fade-in">
  <h1 class="text-2xl font-bold mb-1" style="color:var(--navy)">סל הקניות שלי</h1>
  <div class="sf-badge mb-4">SF: הסל מנוהל כטיוטת Opportunity + OpportunityLineItem לכל שורת מוצר</div>
  <div class="grid md:grid-cols-3 gap-6">
    <div class="md:col-span-2 space-y-3" id="cartItems"></div>
    <div class="card p-5 h-fit">
      <div class="font-bold mb-3">סיכום הזמנה</div>
      <div class="flex justify-between text-sm mb-1"><span>סכום ביניים</span><span id="sumSub">0 ₪</span></div>
      <div class="flex justify-between text-sm mb-1"><span>מע"מ (17%)</span><span id="sumVat">0 ₪</span></div>
      <div class="flex justify-between font-bold text-base border-t pt-2 mt-2" style="border-color:var(--line);"><span>סה"כ לתשלום</span><span id="sumTotal">0 ₪</span></div>
      <button class="w-full gold-btn rounded-lg py-2.5 mt-4 font-semibold" onclick="go('checkout')">המשך לתשלום</button>
      <button class="w-full mt-2 text-sm py-2" style="color:var(--teal)" onclick="go('catalog')">המשך בקנייה</button>
    </div>
  </div>
</section>

<!-- ============ CHECKOUT ============ -->
<section id="route-checkout" class="route fade-in">
  <h1 class="text-2xl font-bold mb-6" style="color:var(--navy)">תשלום מאובטח</h1>
  <div class="flex items-center gap-3 mb-8" id="checkoutSteps"></div>
  <div class="grid md:grid-cols-3 gap-6">
    <div class="md:col-span-2 card p-6" id="checkoutBody"></div>
    <div class="card p-5 h-fit">
      <div class="font-bold mb-3">סיכום הזמנה</div>
      <div class="flex justify-between font-bold text-base"><span>סה"כ לתשלום</span><span id="coTotal">0 ₪</span></div>
      <div class="sf-badge mt-3">SF: אישור תשלום ← יצירת Order מתוך ה-Opportunity שנסגרה (Closed Won) + עדכון שדה Payment Status</div>
    </div>
  </div>
</section>

<!-- ============ ACCOUNT ============ -->
<section id="route-account" class="route fade-in">
  <h1 class="text-2xl font-bold mb-1" style="color:var(--navy)">האזור האישי</h1>
  <p class="text-sm mb-5" style="color:var(--ink-soft)">שלום, ישראל ישראלי | לקוח ארגוני - עיריית דוגמה</p>
  <div class="flex gap-2 overflow-x-auto mb-6 pb-1" id="accountTabs"></div>
  <div id="accountBody"></div>
</section>

<!-- ============ SUPPORT ============ -->
<section id="route-support" class="route fade-in">
  <h1 class="text-2xl font-bold mb-1" style="color:var(--navy)">תמיכה ושירותים מקצועיים</h1>
  <p class="text-sm mb-6" style="color:var(--ink-soft)">פתיחת פנייה, בקשת ייעוץ מודד מקצועי או בקשת אישור/תעודה.</p>
  <div class="sf-badge mb-4">SF: שליחת הטופס ← יצירת רשומת Case מסוג "בקשת שירות" + שיוך ל-Contact/Account, הפעלת Action Plan Template לפי סוג הפנייה</div>
  <div class="grid md:grid-cols-2 gap-6">
    <div class="card p-6">
      <div class="font-bold mb-4">פתיחת פנייה חדשה</div>
      <label class="text-sm block mb-1">סוג הפנייה</label>
      <select class="w-full border rounded-lg px-3 py-2 mb-3 text-sm" style="border-color:var(--line);">
        <option>בקשה לייעוץ מודד מוסמך</option>
        <option>בקשת אישור / תעודת עובד ציבור</option>
        <option>תמיכה טכנית במוצר שנרכש</option>
        <option>בירור חשבונית / תשלום</option>
      </select>
      <label class="text-sm block mb-1">תיאור הפנייה</label>
      <textarea rows="4" class="w-full border rounded-lg px-3 py-2 mb-4 text-sm" style="border-color:var(--line);" placeholder="פרטו את בקשתכם..."></textarea>
      <button class="gold-btn rounded-lg px-5 py-2.5 text-sm font-semibold" onclick="submitCase()">שליחת פנייה</button>
    </div>
    <div class="card p-6">
      <div class="font-bold mb-4">הפניות הפתוחות שלי</div>
      <div id="caseList" class="space-y-3 text-sm"></div>
    </div>
  </div>
</section>

</main>

<footer class="brand-gradient text-white mt-16">
  <div class="max-w-7xl mx-auto px-4 py-10 grid md:grid-cols-4 gap-6 text-sm">
    <div>
      <div class="font-bold mb-2">המרכז למיפוי ישראל</div>
      <p class="text-white/70 leading-relaxed">היחידה הממשלתית המוסמכת למיפוי, מדידה ורישום מקרקעין במדינת ישראל.</p>
    </div>
    <div><div class="font-bold mb-2">מוצרים</div><div class="text-white/70 space-y-1"><div>תצלומי אוויר ואורתופוטו</div><div>מפות טופוגרפיות</div><div>שכבות GIS</div><div>שירותי GNSS</div></div></div>
    <div><div class="font-bold mb-2">שירות</div><div class="text-white/70 space-y-1"><div>האזור האישי</div><div>תמיכה</div><div>שאלות נפוצות</div></div></div>
    <div><div class="font-bold mb-2">נגישות ומדינה</div><div class="text-white/70 space-y-1"><div>הצהרת נגישות</div><div>מדיניות פרטיות</div><div>gov.il</div></div></div>
  </div>
  <div class="text-center text-xs text-white/50 py-4 border-t border-white/10">דמו הדגמה ללקוח - כל התכנים להמחשה בלבד © 2026</div>
</footer>

<script>
/* ================= DATA MODEL ================= */
const CATEGORIES = [
  {id:'aerial', name:'תצלומי אוויר ואורתופוטו', icon:'✈️', tracks:['Aerial Photos','Orthophoto & Elevation']},
  {id:'maps', name:'מפות טופוגרפיות והיסטוריות', icon:'🗺️', tracks:['Paper Maps']},
  {id:'custom', name:'מפות מותאמות אישית', icon:'🖨️', tracks:['Custom Map']},
  {id:'gis', name:'שכבות GIS ושירותי מיפוי מקוונים', icon:'🌐', tracks:['GIS Layers','WS Subscription']},
  {id:'gnss', name:'שירותי מיקום לוויני (GNSS/CORS)', icon:'📡', tracks:['CORS Subscription']},
  {id:'borders', name:'גבולות ושמות מקומות', icon:'📍', tracks:['International Borders','Gazetteer']},
  {id:'survey', name:'שירותי מדידה ותעודות', icon:'🧭', tracks:['Surveyor Inspection Fee','Public Servant Certificate','Tazar Extension']},
  {id:'cadastre', name:'מדידות מקרקעין - גוש חלקה', icon:'📐', tracks:['Cadastre Jerusalem']},
  {id:'pro', name:'שירותים מקצועיים ומנויים', icon:'🤝', tracks:['Recurring Payment']},
