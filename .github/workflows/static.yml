function svgWrap(inner){
  return `<svg viewBox="0 0 400 300" preserveAspectRatio="xMidYMid slice" class="w-full h-full">${inner}</svg>`;
}
function gridLines(color, step, opacity){
  let s='';
  for(let x=step;x<400;x+=step) s+=`<line x1="${x}" y1="0" x2="${x}" y2="300" stroke="${color}" stroke-width="1" opacity="${opacity}"/>`;
  for(let y=step;y<300;y+=step) s+=`<line x1="0" y1="${y}" x2="400" y2="${y}" stroke="${color}" stroke-width="1" opacity="${opacity}"/>`;
  return s;
}
