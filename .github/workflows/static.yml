      <div class="text-xs" style="color:#0d2b45"><b>אוטומציה:</b> ${s.auto}</div>
      <div class="text-xs" style="color:#0d2b45"><b>התראה:</b> ${s.notif}</div>
      <div class="text-xs" style="color:#0d2b45"><b>שלב הבא:</b> ${s.next}</div>
    </div>`).join('') || '<div class="text-sm" style="color:var(--ink-soft)">אין מיפוי ספציפי למסך זה.</div>';
}

